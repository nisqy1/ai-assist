<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance AI Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 420px;
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    #chat-box {
      height: 400px;
      overflow-y: auto;
      background: #334155;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      max-width: 80%;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #475569;
      margin-right: auto;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
    }

    button {
      padding: 12px 16px;
      border: none;
      background: #10b981;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <h2>💰 Finance AI</h2>

    <div id="chat-box"></div>

    <div class="input-area">
      <input type="text" id="message" placeholder="Digite sua pergunta...">
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById('message');
      const msg = input.value;
      const chatBox = document.getElementById('chat-box');

      if (!msg.trim()) return;

      chatBox.innerHTML += `<div class="msg user">${msg}</div>`;
      input.value = '';

      const response = await fetch('/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message: msg })
      });

      const data = await response.json();

      chatBox.innerHTML += `<div class="msg bot">${data.response}</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
